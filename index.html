<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghost Channel - Loading...</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #140f17;
            --red-main: #730c1e;
            --red-dark: #210207;
            --white: #f0f0f0;
            --font-pixel: 'Press Start 2P', cursive;
            
            /* 经典吃豆人幽灵 - 帧1 (外侧触手朝下) */
            --ghost-run-f1: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 14 14"><path d="M4 0h6v1h2v1h1v1h1v8h-1v1h-2v1h-2v-1h-2v1h-2v-1h-2v1H2v-1H0v-8h1V2h1V1h2V0z" fill="%23730c1e"/><path d="M2 3h3v5H2zM8 3h3v5H8z" fill="white"/><path d="M4 5h2v2H4zM10 5h2v2H10z" fill="%23140f17"/></svg>');
            /* 经典吃豆人幽灵 - 帧2 (内侧触手朝下) */
            --ghost-run-f2: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 14 14"><path d="M4 0h6v1h2v1h1v1h1v8h-2v1h-2v1h-2v-1h-2v1h-2v-1h-2v1H0v-9h1V2h1V1h2V0z" fill="%23730c1e"/><path d="M2 3h3v5H2zM8 3h3v5H8z" fill="white"/><path d="M4 5h2v2H4zM10 5h2v2H10z" fill="%23140f17"/></svg>');
            
            /* 迎宾幽灵 - 帧1 (带小手，正视前方) */
            --ghost-welcome-f1: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 18 14"><path d="M6 0h6v1h2v1h1v1h1v8h-1v1h-2v1h-2v-1h-2v1h-2v-1h-2v1H4v-1H2v-8h1V2h1V1h2V0z M0 6h2v2H0zM16 6h2v2H16z" fill="%23730c1e"/><path d="M4 3h3v5H4zM11 3h3v5H11z" fill="white"/><path d="M5 5h1v2H5zM12 5h1v2H12z" fill="%23140f17"/></svg>');
            /* 迎宾幽灵 - 帧2 (手举起挥动) */
            --ghost-welcome-f2: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 18 14"><path d="M6 0h6v1h2v1h1v1h1v8h-2v1h-2v1h-2v-1h-2v1h-2v-1h-2v1H2v-9h1V2h1V1h2V0z M0 4h2v2H0zM16 4h2v2H16z" fill="%23730c1e"/><path d="M4 3h3v5H4zM11 3h3v5H11z" fill="white"/><path d="M5 5h1v2H5zM12 5h1v2H12z" fill="%23140f17"/></svg>');
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body, html {
            width: 100%; height: 100%;
            background-color: var(--bg-color);
            overflow: hidden;
            font-family: var(--font-pixel);
            color: var(--white);
        }

        /* --- CRT扫描线与屏幕暗角 --- */
        .crt-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 3px 100%;
            pointer-events: none; z-index: 999;
        }
        .vignette {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 50%, #000 120%);
            pointer-events: none; z-index: 998;
        }

        /* --- SKIP 按钮 --- */
        .skip-btn {
            position: absolute; top: 20px; right: 20px; z-index: 1000;
            padding: 10px 15px; background: transparent; 
            border: 2px solid var(--red-main); color: var(--red-main); 
            font-family: var(--font-pixel); font-size: 12px;
            cursor: pointer; text-transform: uppercase; transition: all 0.2s;
        }
        .skip-btn:hover {
            background: var(--red-main); color: var(--bg-color);
            box-shadow: 0 0 15px var(--red-main);
        }

        /* ================= 阶段 1 & 2 (0-6s) ================= */
        .scene-1 {
            position: absolute; width: 100%; height: 100%;
            animation: hide-scene 0s linear 6s forwards;
        }
        @keyframes hide-scene { to { display: none; opacity: 0; visibility: hidden; } }

        .grid {
            position: absolute; width: 100%; height: 100%;
            background-image: 
                linear-gradient(var(--red-dark) 1px, transparent 1px),
                linear-gradient(90deg, var(--red-dark) 1px, transparent 1px);
            background-size: 40px 40px; opacity: 0;
            animation: grid-fade 3s ease-in forwards;
        }
        @keyframes grid-fade { to { opacity: 0.4; } }

        /* 纯正像素豆豆 */
        .pellet {
            position: absolute; top: 50%; width: 10px; height: 10px;
            background: var(--white); transform: translateY(-50%);
            box-shadow: 0 0 10px rgba(255,255,255,0.8);
            animation: pellet-eat 0.1s forwards;
        }
        @keyframes pellet-eat { to { opacity: 0; transform: translateY(-50%) scale(0); } }

        /* 跑动幽灵：包含触手蠕动动画 */
        .ghost-runner {
            position: absolute; top: 50%; left: -15vw;
            width: 80px; height: 80px; transform: translateY(-50%);
            background-image: var(--ghost-run-f1);
            background-size: contain; background-repeat: no-repeat;
            image-rendering: pixelated;
            animation: 
                ghost-move 6s linear forwards,
                ghost-chomp 0.3s steps(1) infinite;
        }
        @keyframes ghost-move { 100% { left: 110vw; } }
        @keyframes ghost-chomp {
            0%, 100% { background-image: var(--ghost-run-f1); }
            50% { background-image: var(--ghost-run-f2); }
        }

        /* ================= 阶段 3 (6-8s) 崩坏 ================= */
        .scene-2 {
            position: absolute; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            opacity: 0; visibility: hidden;
            animation: show-scene-2 2s linear 6s forwards;
        }
        .error-text {
            font-size: 48px; color: var(--red-main);
            text-shadow: 4px 4px 0px var(--red-dark);
            animation: glitch 0.2s infinite;
        }
        @keyframes show-scene-2 {
            0% { opacity: 1; visibility: visible; background: var(--white); }
            5% { background: transparent; }
            95% { opacity: 1; visibility: visible; }
            100% { opacity: 0; visibility: hidden; }
        }
        @keyframes glitch {
            0% { transform: translate(0) }
            20% { transform: translate(-4px, 4px) }
            40% { transform: translate(-4px, -4px) }
            60% { transform: translate(4px, 4px) }
            80% { transform: translate(4px, -4px) }
            100% { transform: translate(0) }
        }

        /* ================= 阶段 4 & 5 (8-13s) 气泡与迎宾 ================= */
        .scene-3 {
            position: absolute; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            opacity: 0; visibility: hidden;
            animation: show-scene-3 5s linear 8s forwards;
        }
        @keyframes show-scene-3 { 0%, 100% { opacity: 1; visibility: visible; } }

        .pixel-bubble {
            position: absolute; padding: 20px 30px;
            background: var(--bg-color); border: 4px solid var(--white);
            color: var(--white); font-size: 14px; line-height: 1.5;
            box-shadow: 8px 8px 0px var(--red-dark); text-align: center;
        }
        .pixel-bubble::after {
            content: ''; position: absolute; bottom: -16px; left: 50%;
            transform: translateX(-50%); width: 16px; height: 16px; 
            background: var(--bg-color);
            border-right: 4px solid var(--white); border-bottom: 4px solid var(--white);
        }

        /* 气泡1 */
        .bubble-1 {
            opacity: 0; transform: scale(0);
            animation: 
                bubble-pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) 8s forwards,
                bubble-shake 1.5s ease-in-out 8.5s forwards,
                bubble-shatter 0.2s linear 10s forwards;
        }
        @keyframes bubble-pop { to { opacity: 1; transform: scale(1); } }
        @keyframes bubble-shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-5px) rotate(-2deg); }
            20%, 40%, 60%, 80% { transform: translateX(5px) rotate(2deg); }
        }
        @keyframes bubble-shatter {
            to { opacity: 0; transform: scale(1.2) translateY(-20px); filter: blur(5px); }
        }

        /* 气泡2 */
        .bubble-2 {
            top: 25%; opacity: 0;
            border-color: var(--red-main); color: var(--red-main);
            box-shadow: 8px 8px 0px var(--red-dark);
            animation: bubble-pop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) 10.2s forwards;
        }
        .bubble-2 .sub-text {
            display: block; margin-top: 15px; font-size: 10px; color: var(--white); opacity: 0.7;
        }
        .bubble-2::after { border-color: var(--red-main); }

        /* 迎宾幽灵：带有挥手和弹跳动画 */
        .ghost-welcomer {
            position: absolute; top: 50%;
            width: 100px; height: 100px;
            background-image: var(--ghost-welcome-f1);
            background-size: contain; background-repeat: no-repeat;
            image-rendering: pixelated; opacity: 0;
            animation: 
                welcome-appear 0.5s ease-out 10.5s forwards,
                ghost-wave 0.6s steps(1) infinite 10.5s;
        }
        @keyframes welcome-appear {
            0% { opacity: 0; transform: translateY(50px) scale(0.5); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }
        @keyframes ghost-wave {
            0%, 100% { background-image: var(--ghost-welcome-f1); transform: translateY(0); }
            50% { background-image: var(--ghost-welcome-f2); transform: translateY(-10px); }
        }

        /* 最终过渡 */
        .final-transition {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-color); opacity: 0; visibility: hidden;
            z-index: 9999; pointer-events: none;
            animation: final-fade 1s ease-in 13s forwards;
        }
        @keyframes final-fade {
            0% { opacity: 0; visibility: visible; pointer-events: all; }
            100% { opacity: 1; visibility: visible; pointer-events: all; }
        }
    </style>
</head>
<body>

    <div class="crt-overlay"></div>
    <div class="vignette"></div>
    <button class="skip-btn" onclick="skipIntro()">Skip >></button>

    <!-- 阶段 1 & 2 -->
    <div class="scene-1">
        <div class="grid"></div>
        <div class="pellet" style="left: 20vw; animation-delay: 1.5s;"></div>
        <div class="pellet" style="left: 40vw; animation-delay: 2.5s;"></div>
        <div class="pellet" style="left: 60vw; animation-delay: 3.5s;"></div>
        <div class="pellet" style="left: 80vw; animation-delay: 4.5s;"></div>
        <div class="pellet" style="left: 100vw; animation-delay: 5.5s;"></div>
        <div class="ghost-runner"></div>
    </div>

    <!-- 阶段 3: 404 崩坏 -->
    <div class="scene-2">
        <div class="error-text">404 NOT FOUND</div>
    </div>

    <!-- 阶段 4 & 5: 对话与欢迎 -->
    <div class="scene-3">
        <div class="pixel-bubble bubble-1">wait... really?</div>
        <div class="pixel-bubble bubble-2">
            .....welcome to ghost_channel!!
            <span class="sub-text">The middle of no where</span>
        </div>
        <div class="ghost-welcomer"></div>
    </div>

    <!-- 最终过渡层 -->
    <div class="final-transition"></div>

    <script>
        // 自动跳转到主页
        setTimeout(() => {
            window.location.href = 'home.html';
        }, 14000);

        // SKIP按钮功能
        function skipIntro() {
            window.location.href = 'home.html';
        }
    </script>

</body>
</html>
