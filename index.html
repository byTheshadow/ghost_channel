<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ghost_channel</title>

    <!-- 中文字体 -->
    <style>
        @import url("https://fontsapi.zeoseven.com/689/main/result.css");
        @import url("https://fontsapi.zeoseven.com/914/main/result.css");
        @import url("https://fontsapi.zeoseven.com/44/main/result.css");
        @import url("https://fontsapi.zeoseven.com/993/main/result.css");
    </style>

    <!-- 英文字体 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Mountains+of+Christmas:wght@400;700&family=Risque&family=Underdog&family=UnifrakturCook:wght@700&family=Manufacturing+Consent&family=Press+Start+2P&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="assets/css/global.css">
    <link rel="stylesheet" href="assets/css/animations.css">
    <link rel="stylesheet" href="assets/css/components.css">
</head>
<body>

    <!-- ==================== 噪点叠加层 ==================== -->
    <div class="noise-overlay" aria-hidden="true"></div>
    <!-- 扫描线 -->
    <div class="scanlines" aria-hidden="true"></div>

    <!-- ==================== 开屏动画层 ==================== -->
    <div id="intro-screen">
        <!-- SKIP按钮 -->
        <button id="skip-btn" onclick="skipIntro()">[ SKIP ]</button>

        <!-- 8bit网格背景 -->
        <canvas id="grid-canvas"></canvas>

        <!-- 幽灵场景 -->
        <div id="ghost-scene">
            <!-- 幽灵 -->
            <div id="ghost">
                <svg viewBox="0 0 32 36" width="64" height="72" class="ghost-svg">
                    <!-- 幽灵身体 -->
                    <rect x="10" y="2" width="12" height="2" fill="currentColor"/>
                    <rect x="8" y="4" width="2" height="2" fill="currentColor"/>
                    <rect x="22" y="4" width="2" height="2" fill="currentColor"/>
                    <rect x="6" y="6" width="2" height="2" fill="currentColor"/>
                    <rect x="24" y="6" width="2" height="2" fill="currentColor"/>
                    <rect x="4" y="8" width="2" height="2" fill="currentColor"/>
                    <rect x="26" y="8" width="2" height="2" fill="currentColor"/>
                    <rect x="4" y="10" width="24" height="2" fill="currentColor"/>
                    <rect x="4" y="12" width="24" height="2" fill="currentColor"/>
                    <!-- 眼睛 -->
                    <rect x="10" y="10" width="4" height="4" fill="#140f17"/>
                    <rect x="18" y="10" width="4" height="4" fill="#140f17"/>
                    <rect x="12" y="12" width="2" height="2" fill="#fff"/>
                    <rect x="20" y="12" width="2" height="2" fill="#fff"/>
                    <!-- 身体延续 -->
                    <rect x="4" y="14" width="24" height="2" fill="currentColor"/>
                    <rect x="4" y="16" width="24" height="2" fill="currentColor"/>
                    <rect x="4" y="18" width="24" height="2" fill="currentColor"/>
                    <rect x="4" y="20" width="24" height="2" fill="currentColor"/>
                    <rect x="4" y="22" width="24" height="2" fill="currentColor"/>
                    <rect x="4" y="24" width="24" height="2" fill="currentColor"/>
                    <rect x="4" y="26" width="24" height="2" fill="currentColor"/>
                    <!-- 底部波浪 -->
                    <rect x="4" y="28" width="4" height="2" fill="currentColor"/>
                    <rect x="12" y="28" width="4" height="2" fill="currentColor"/>
                    <rect x="20" y="28" width="4" height="2" fill="currentColor"/>
                    <rect x="4" y="30" width="2" height="2" fill="currentColor"/>
                    <rect x="14" y="30" width="2" height="2" fill="currentColor"/>
                    <rect x="22" y="30" width="2" height="2" fill="currentColor"/>
                </svg>
            </div>

            <!-- 豆豆 -->
            <div id="dots-track">
                <span class="pac-dot" style="--i:0"></span>
                <span class="pac-dot" style="--i:1"></span>
                <span class="pac-dot" style="--i:2"></span>
                <span class="pac-dot" style="--i:3"></span>
                <span class="pac-dot" style="--i:4"></span>
                <span class="pac-dot" style="--i:5"></span>
                <span class="pac-dot" style="--i:6"></span>
                <span class="pac-dot" style="--i:7"></span>
            </div>
        </div>

        <!-- 404 文字 -->
        <div id="glitch-404" class="hidden">
            <span data-text="404 NOT FOUND">404 NOT FOUND</span>
        </div>

        <!-- 气泡框 -->
        <div id="bubble-1" class="speech-bubble hidden">
            <span>wait... really?</span>
        </div>
        <div id="bubble-2" class="speech-bubble hidden">
            <span>.....welcome to ghost_channel!!</span>
        </div>

        <!-- 幽灵欢迎动作 -->
        <div id="ghost-welcome" class="hidden">
            <svg viewBox="0 0 48 52" width="96" height="104" class="ghost-svg welcome-ghost">
                <!-- 更大的幽灵 带手 -->
                <rect x="16" y="2" width="16" height="2" fill="currentColor"/>
                <rect x="12" y="4" width="4" height="2" fill="currentColor"/>
                <rect x="32" y="4" width="4" height="2" fill="currentColor"/>
                <rect x="10" y="6" width="2" height="2" fill="currentColor"/>
                <rect x="36" y="6" width="2" height="2" fill="currentColor"/>
                <rect x="8" y="8" width="2" height="2" fill="currentColor"/>
                <rect x="38" y="8" width="2" height="2" fill="currentColor"/>
                <rect x="8" y="10" width="32" height="2" fill="currentColor"/>
                <rect x="8" y="12" width="32" height="2" fill="currentColor"/>
                <!-- 眼睛 -->
                <rect x="14" y="12" width="6" height="6" fill="#140f17"/>
                <rect x="26" y="12" width="6" height="6" fill="#140f17"/>
                <rect x="16" y="14" width="4" height="2" fill="#fff"/>
                <rect x="28" y="14" width="4" height="2" fill="#fff"/>
                <!-- 嘴巴（微笑） -->
                <rect x="18" y="22" width="2" height="2" fill="#140f17"/>
                <rect x="20" y="24" width="8" height="2" fill="#140f17"/>
                <rect x="28" y="22" width="2" height="2" fill="#140f17"/>
                <!-- 身体 -->
                <rect x="8" y="14" width="32" height="2" fill="currentColor"/>
                <rect x="8" y="16" width="32" height="2" fill="currentColor"/>
                <rect x="8" y="18" width="32" height="2" fill="currentColor"/>
                <rect x="8" y="20" width="32" height="2" fill="currentColor"/>
                <rect x="8" y="22" width="10" height="2" fill="currentColor"/>
                <rect x="30" y="22" width="10" height="2" fill="currentColor"/>
                <rect x="8" y="24" width="12" height="2" fill="currentColor"/>
                <rect x="28" y="24" width="12" height="2" fill="currentColor"/>
                <rect x="8" y="26" width="32" height="2" fill="currentColor"/>
                <rect x="8" y="28" width="32" height="2" fill="currentColor"/>
                <rect x="8" y="30" width="32" height="2" fill="currentColor"/>
                <rect x="8" y="32" width="32" height="2" fill="currentColor"/>
                <rect x="8" y="34" width="32" height="2" fill="currentColor"/>
                <rect x="8" y="36" width="32" height="2" fill="currentColor"/>
                <!-- 底部波浪 -->
                <rect x="8" y="38" width="6" height="2" fill="currentColor"/>
                <rect x="18" y="38" width="6" height="2" fill="currentColor"/>
                <rect x="28" y="38" width="6" height="2" fill="currentColor"/>
                <!-- 左手挥动 -->
                <rect x="2" y="16" width="6" height="2" fill="currentColor" class="ghost-hand-l"/>
                <rect x="0" y="14" width="4" height="2" fill="currentColor" class="ghost-hand-l"/>
                <!-- 右手挥动 -->
                <rect x="40" y="16" width="6" height="2" fill="currentColor" class="ghost-hand-r"/>
                <rect x="44" y="14" width="4" height="2" fill="currentColor" class="ghost-hand-r"/>
            </svg>
        </div>
    </div>

    <!-- ==================== 主界面层 ==================== -->
    <div id="main-screen" class="hidden">

        <!-- 聚光灯跟随层 -->
        <div id="spotlight"></div>

        <!-- 乐谱背景 -->
        <div id="music-bg" aria-hidden="true">
            <svg id="staff-lines" width="100%" height="100%"></svg>
            <!-- 漂浮音符 -->
            <div class="floating-note" style="--x:10%;--y:20%;--delay:0s;--dur:6s">&#9835;</div>
            <div class="floating-note" style="--x:80%;--y:15%;--delay:1s;--dur:7s">&#9833;</div>
            <div class="floating-note" style="--x:25%;--y:70%;--delay:2s;--dur:5s">&#9834;</div>
            <div class="floating-note" style="--x:65%;--y:60%;--delay:0.5s;--dur:8s">&#9835;</div>
            <div class="floating-note" style="--x:45%;--y:85%;--delay:3s;--dur:6s">&#9833;</div>
            <div class="floating-note" style="--x:90%;--y:40%;--delay:1.5s;--dur:7s">&#9834;</div>
            <div class="floating-note" style="--x:5%;--y:50%;--delay:2.5s;--dur:5s">&#9835;</div>
            <div class="floating-note" style="--x:70%;--y:80%;--delay:0.8s;--dur:9s">&#9839;</div>
        </div>

        <!-- 导航 -->
        <nav id="main-nav">
            <div class="nav-inner glass-panel">
                <a href="#" class="nav-logo" data-text="G_C">G_C</a>
                <div class="nav-links">
                    <a href="pages/about.html" class="nav-link" data-text="ABOUT">ABOUT</a>
                    <a href="pages/characters.html" class="nav-link" data-text="CHARACTERS">CHARACTERS</a>
                    <a href="pages/gallery.html" class="nav-link" data-text="GALLERY">GALLERY</a>
                    <a href="pages/presets.html" class="nav-link" data-text="PRESETS">PRESETS</a>
                    <a href="pages/plugins.html" class="nav-link" data-text="PLUGINS">PLUGINS</a>
                    <a href="pages/links.html" class="nav-link" data-text="LINKS">LINKS</a>
                </div>
                <button id="nav-toggle" class="nav-hamburger" aria-label="Toggle menu">
                    <span></span><span></span><span></span>
                </button>
            </div>
        </nav>

        <!-- 打印机区域 -->
        <main id="printer-section">
            <div class="printer-wrapper">
                <!-- 打印机机身 -->
                <div class="printer-body">
                    <div class="printer-top">
                        <div class="printer-ridge"></div>
                        <div class="printer-ridge"></div>
                        <div class="printer-ridge"></div>
                        <div class="printer-slot"></div>
                        <div class="printer-led">
                            <span class="led led-green blink"></span>
                            <span class="led led-red"></span>
                        </div>
                    </div>
                    <div class="printer-front">
                        <div class="printer-output-slot"></div>
                        <div class="printer-label">GHOST_CHANNEL <span class="label-model">MK-II</span></div>
                    </div>
                </div>

                <!-- 打印输出的纸张 -->
                <div class="paper-container">
                    <div class="paper" id="printer-paper">
                        <div class="paper-edge-holes">
                            <span></span><span></span><span></span><span></span><span></span>
                            <span></span><span></span><span></span><span></span><span></span>
                            <span></span><span></span><span></span><span></span><span></span>
                        </div>
                        <div class="paper-content" id="paper-content">
                            <!-- 打字机逐行填充 -->
                        </div>
                        <div class="paper-edge-holes right">
                            <span></span><span></span><span></span><span></span><span></span>
                            <span></span><span></span><span></span><span></span><span></span>
                            <span></span><span></span><span></span><span></span><span></span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 左侧散落音符装饰 -->
            <div class="deco-left">
                <div class="deco-note">&#9835;</div>
                <div class="deco-note">&#9834;</div>
                <div class="deco-note">&#9833;</div>
            </div>
            <!-- 右侧乐谱片段 -->
            <div class="deco-right">
                <div class="sheet-scrap glass-panel">
                    <div class="mini-staff">
                        <span class="staff-line"></span>
                        <span class="staff-line"></span>
                        <span class="staff-line"></span>
                        <span class="staff-line"></span>
                        <span class="staff-line"></span>
                        <span class="mini-note" style="left:15%;top:30%">&#9834;</span>
                        <span class="mini-note" style="left:35%;top:50%">&#9835;</span>
                        <span class="mini-note" style="left:55%;top:20%">&#9833;</span>
                        <span class="mini-note" style="left:75%;top:60%">&#9834;</span>
                    </div>
                </div>
            </div>
        </main>

        <!-- 底部小幽灵 -->
        <div id="footer-ghost">
            <svg viewBox="0 0 32 36" width="28" height="32" class="ghost-svg mini">
                <rect x="10" y="2" width="12" height="2" fill="currentColor"/>
                <rect x="8" y="4" width="2" height="2" fill="currentColor"/>
                <rect x="22" y="4" width="2" height="2" fill="currentColor"/>
                <rect x="6" y="6" width="2" height="2" fill="currentColor"/>
                <rect x="24" y="6" width="2" height="2" fill="currentColor"/>
                <rect x="4" y="8" width="24" height="2" fill="currentColor"/>
                <rect x="4" y="10" width="24" height="2" fill="currentColor"/>
                <rect x="10" y="10" width="4" height="4" fill="#140f17"/>
                <rect x="18" y="10" width="4" height="4" fill="#140f17"/>
                <rect x="12" y="12" width="2" height="2" fill="#fff"/>
                <rect x="20" y="12" width="2" height="2" fill="#fff"/>
                <rect x="4" y="12" width="24" height="16" fill="currentColor"/>
                <rect x="4" y="28" width="4" height="2" fill="currentColor"/>
                <rect x="12" y="28" width="4" height="2" fill="currentColor"/>
                <rect x="20" y="28" width="4" height="2" fill="currentColor"/>
            </svg>
            <span class="footer-text">ghost_channel © 2025 shadow玉元一</span>
        </div>
    </div>

    <!-- ==================== Scripts ==================== -->
    <script src="assets/js/intro.js"></script>
    <script src="assets/js/spotlight.js"></script>
    <script src="assets/js/printer.js"></script>
</body>
</html>
