<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GHOST CHANNEL</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            color: #f0f0f0;
            font-family: 'Courier New', monospace;
            overflow: hidden;
            position: relative;
        }

        /* 噪点效果 */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.03;
            z-index: 1;
            pointer-events: none;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' /%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' /%3E%3C/svg%3E");
            animation: noise 0.2s infinite;
        }

        @keyframes noise {
            0%, 100% { transform: translate(0, 0); }
            10% { transform: translate(-5%, -5%); }
            20% { transform: translate(-10%, 5%); }
            30% { transform: translate(5%, -10%); }
            40% { transform: translate(-5%, 15%); }
            50% { transform: translate(-10%, 5%); }
            60% { transform: translate(15%, 0); }
            70% { transform: translate(0, 10%); }
            80% { transform: translate(-15%, 0); }
            90% { transform: translate(10%, 5%); }
        }

        .container {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        /* 像素网格 */
        .pixel-grid {
            display: flex;
            gap: 30px;
            margin-bottom: 50px;
            opacity: 0;
            animation: fadeIn 0.5s forwards;
        }

        .dot {
            width: 20px;
            height: 20px;
            background: #f0f0f0;
            border-radius: 50%;
            opacity: 1;
        }

        .dot.eaten {
            animation: eatDot 0.3s forwards;
        }

        @keyframes eatDot {
            to {
                opacity: 0;
                transform: scale(0);
            }
        }

        /* 幽灵 */
        .ghost {
            font-size: 40px;
            position: absolute;
            left: -60px;
            opacity: 0;
            animation: ghostMove 2.5s 0.5s forwards;
        }

        @keyframes ghostMove {
            0% { left: -60px; opacity: 1; }
            100% { left: calc(100% + 60px); opacity: 1; }
        }

        /* 大字显示 */
        .big-text {
            font-size: 48px;
            font-weight: bold;
            text-align: center;
            opacity: 0;
            color: #cc0000;
            text-shadow: 0 0 20px #cc0000;
            letter-spacing: 5px;
        }

        .big-text.show {
            animation: glitchIn 0.5s forwards, shake 0.1s infinite;
        }

        @keyframes glitchIn {
            to { opacity: 1; }
        }

        @keyframes shake {
            0%, 100% { transform: translate(0, 0); }
            25% { transform: translate(-2px, 2px); }
            50% { transform: translate(2px, -2px); }
            75% { transform: translate(-2px, -2px); }
        }

        /* 气泡框 */
        .bubble {
            position: relative;
            background: rgba(255, 255, 255, 0.95);
            color: #0a0a0a;
            padding: 15px 25px;
            border-radius: 20px;
            margin-top: 30px;
            opacity: 0;
            font-size: 18px;
            border: 3px solid #0a0a0a;
        }

        .bubble::after {
            content: '';
            position: absolute;
            bottom: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 20px solid #0a0a0a;
        }

        .bubble.show {
            animation: bubbleIn 0.3s forwards;
        }

        @keyframes bubbleIn {
            to { opacity: 1; transform: translateY(-10px); }
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        /* 屏幕闪烁 */
        .flash {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #cc0000;
            opacity: 0;
            pointer-events: none;
            z-index: 999;
        }

        .flash.active {
            animation: flashScreen 0.3s;
        }

        @keyframes flashScreen {
            0%, 100% { opacity: 0; }
            50% { opacity: 0.8; }
        }
    </style>
</head>
<body>
    <div class="flash" id="flash"></div>
    <div class="container">
        <div class="pixel-grid" id="grid">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
        <div class="ghost">👻</div>
        <div class="big-text" id="bigText">404 NOT FOUND</div>
        <div class="bubble" id="bubble"></div>
    </div>

    <script>
        // 动画时间轴
        setTimeout(() => {
            // 幽灵吃豆豆
            const dots = document.querySelectorAll('.dot');
            dots.forEach((dot, index) => {
                setTimeout(() => {
                    dot.classList.add('eaten');
                }, index * 400);
            });
        }, 500);

        setTimeout(() => {
            // 屏幕闪烁
            document.getElementById('flash').classList.add('active');
        }, 3000);

        setTimeout(() => {
            // 显示404
            document.getElementById('bigText').classList.add('show');
        }, 3300);

        setTimeout(() => {
            // 第一个气泡
            const bubble = document.getElementById('bubble');
            bubble.textContent = 'wait... really?';
            bubble.classList.add('show');
        }, 4000);

        setTimeout(() => {
            // 第二个气泡
            const bubble = document.getElementById('bubble');
            bubble.classList.remove('show');
            setTimeout(() => {
                bubble.textContent = '.....';
                bubble.classList.add('show');
            }, 300);
        }, 5000);

        setTimeout(() => {
            // 改变大字
            const bigText = document.getElementById('bigText');
            bigText.style.animation = 'none';
            bigText.textContent = '';
            const text = "WELCOME TO GHOST CHANNEL";
            let i = 0;
            const typeInterval = setInterval(() => {
                if (i < text.length) {
                    bigText.textContent += text[i];
                    i++;
                } else {
                    clearInterval(typeInterval);
                }
            }, 80);
        }, 5500);

        setTimeout(() => {
            // 跳转到主页
            window.location.href = 'main.html';
        }, 8000);
    </script>
</body>
</html>
