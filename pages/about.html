<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About Me - Ghost Channel</title>
    <link rel="stylesheet" href="../assets/css/global.css">
    <link rel="stylesheet" href="../assets/css/about.css">
    <!-- 像素字体 -->
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <!-- 哥特字体 -->
    <link href="https://fonts.googleapis.com/css2?family=Creepster&family=Nosifer&display=swap" rel="stylesheet">
</head>
<body>
    <!-- 噪点层 -->
    <div class="noise-overlay"></div>
    
    <!-- CRT扫描线 -->
    <div class="scanline"></div>
    
    <!-- 屏幕暗角 -->
    <div class="vignette"></div>

    <!-- 导航栏（复用home.html的样式） -->
    <nav class="navbar" id="navbar">
        <div class="nav-content">
            <div class="nav-left">
                <div class="ghost-icon"></div>
                <span class="nav-title">GHOST_CHANNEL</span>
            </div>
            <div class="nav-links">
                <a href="../home.html" class="nav-link">HOME</a>
                <a href="about.html" class="nav-link active">ABOUT</a>
                <a href="characters.html" class="nav-link">CHARACTERS</a>
                <a href="gallery.html" class="nav-link">GALLERY</a>
                <a href="presets.html" class="nav-link">PRESETS</a>
                <a href="plugins.html" class="nav-link">PLUGINS</a>
                <a href="links.html" class="nav-link">LINKS</a>
            </div>
            <div class="hamburger" id="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </nav>

    <!-- 移动端侧边栏 -->
    <div class="sidebar" id="sidebar">
        <a href="../home.html">HOME</a>
        <a href="about.html" class="active">ABOUT</a>
        <a href="characters.html">CHARACTERS</a>
        <a href="gallery.html">GALLERY</a>
        <a href="presets.html">PRESETS</a>
        <a href="plugins.html">PLUGINS</a>
        <a href="links.html">LINKS</a>
    </div>

    <!-- 代码矩阵背景 -->
    <div class="code-matrix" id="codeMatrix"></div>

    <!-- 自定义光标 -->
    <div class="cursor-glow"></div>
    <div class="cursor-dot"></div>

    <!-- 主容器 -->
    <main class="main-container">
        
        <!-- 阶段一：AI提问界面 -->
        <div class="prompt-section" id="promptSection">
            <div class="prompt-card">
                <!-- 水雾效果层 -->
                <div class="fog-layer"></div>
                
                <div class="card-header">
                    <span class="pixel-text">QUERY_SYSTEM</span>
                    <div class="led-indicator"></div>
                </div>
                
                <div class="query-input">
                    <span class="prompt-symbol">▸</span>
                    <span class="query-text">shadow_archives.dat</span>
                </div>
                
                <button class="execute-btn" id="sendBtn">
                    <span class="btn-text">EXECUTE</span>
                    <span class="btn-arrow">→</span>
                </button>
            </div>
        </div>

        <!-- 阶段二：AI回复界面 -->
        <div class="response-section" id="responseSection">
            <div class="response-card">
                <div class="card-top">
                    <span class="archives-title">◈ SHADOW ARCHIVES ◈</span>
                    <div class="scan-line"></div>
                </div>
                
                <div id="typewriterOutput" class="archives-content">
                    <!-- 打字机内容 -->
                </div>

                <div class="card-bottom">
                    <button class="return-btn" id="backBtn">
                        <span>← RETURN</span>
                    </button>
                </div>
            </div>
        </div>

    </main>

    <script src="../assets/js/about.js"></script>
</body>
</html>
