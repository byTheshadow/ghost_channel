<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shadow Archives | Ghost Channel</title>
    <link rel="stylesheet" href="../assets/css/global.css">
    <link rel="stylesheet" href="../assets/css/about.css">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400&family=Playfair+Display:ital,wght@1,500&display=swap" rel="stylesheet">
    <!-- 像素中文字体 -->
    <link rel="stylesheet" href="https://fontsapi.zeoseven.com/316/main/result.css">
</head>
<body>
    <!-- CRT 效果层 -->
    <div class="crt-overlay"></div>
    <div class="vignette"></div>

    <!-- 自定义光标 -->
    <div class="custom-cursor"></div>

    <!-- 导航栏（统一 home.html 风格） -->
    <nav class="ghost-nav" id="ghostNav">
        <div class="nav-brand">
            <span class="nav-ghost-icon"></span>
            <span class="nav-title">GHOST_CHANNEL</span>
        </div>
        <div class="nav-links">
            <a href="../home.html" class="nav-link" data-text="HOME">
                HOME
                <div class="ghost-tooltip">
                    <div class="ghost-tooltip-inner">
                        <div class="ghost-tooltip-sprite"></div>
                        <div class="ghost-tooltip-bubble">
                            <span class="ghost-tooltip-text">主界面</span>
                        </div>
                    </div>
                </div>
            </a>
            <a href="about.html" class="nav-link active" data-text="ABOUT">
                ABOUT
                <div class="ghost-tooltip">
                    <div class="ghost-tooltip-inner">
                        <div class="ghost-tooltip-sprite"></div>
                        <div class="ghost-tooltip-bubble">
                            <span class="ghost-tooltip-text">关于我</span>
                        </div>
                    </div>
                </div>
            </a>
            <a href="characters.html" class="nav-link" data-text="CHARACTERS">
                CHARACTERS
                <div class="ghost-tooltip">
                    <div class="ghost-tooltip-inner">
                        <div class="ghost-tooltip-sprite"></div>
                        <div class="ghost-tooltip-bubble">
                            <span class="ghost-tooltip-text">角色卡区</span>
                        </div>
                    </div>
                </div>
            </a>
            <a href="gallery.html" class="nav-link" data-text="GALLERY">
                GALLERY
                <div class="ghost-tooltip">
                    <div class="ghost-tooltip-inner">
                        <div class="ghost-tooltip-sprite"></div>
                        <div class="ghost-tooltip-bubble">
                            <span class="ghost-tooltip-text">美化作品</span>
                        </div>
                    </div>
                </div>
            </a>
            <a href="presets.html" class="nav-link" data-text="PRESETS">
                PRESETS
                <div class="ghost-tooltip">
                    <div class="ghost-tooltip-inner">
                        <div class="ghost-tooltip-sprite"></div>
                        <div class="ghost-tooltip-bubble">
                            <span class="ghost-tooltip-text">预设展示</span>
                        </div>
                    </div>
                </div>
            </a>
            <a href="plugins.html" class="nav-link" data-text="PLUGINS">
                PLUGINS
                <div class="ghost-tooltip">
                    <div class="ghost-tooltip-inner">
                        <div class="ghost-tooltip-sprite"></div>
                        <div class="ghost-tooltip-bubble">
                            <span class="ghost-tooltip-text">插件介绍</span>
                        </div>
                    </div>
                </div>
            </a>
            <a href="links.html" class="nav-link" data-text="LINKS">
                LINKS
                <div class="ghost-tooltip">
                    <div class="ghost-tooltip-inner">
                        <div class="ghost-tooltip-sprite"></div>
                        <div class="ghost-tooltip-bubble">
                            <span class="ghost-tooltip-text">外部链接</span>
                        </div>
                    </div>
                </div>
            </a>
        </div>
        <button class="nav-burger" id="navBurger" aria-label="Menu">
            <span></span><span></span><span></span>
        </button>
    </nav>

    <!-- 移动端侧边菜单 -->
    <div class="mobile-menu" id="mobileMenu">
        <a href="../home.html" class="mobile-link">HOME</a>
        <a href="about.html" class="mobile-link active">ABOUT</a>
        <a href="characters.html" class="mobile-link">CHARACTERS</a>
        <a href="gallery.html" class="mobile-link">GALLERY</a>
        <a href="presets.html" class="mobile-link">PRESETS</a>
        <a href="plugins.html" class="mobile-link">PLUGINS</a>
        <a href="links.html" class="mobile-link">LINKS</a>
    </div>

    <!-- 粒子画布 -->
    <canvas id="particle-canvas"></canvas>

    <!-- 混沌弹窗容器 -->
    <div id="popup-container"></div>

    <!-- 界面 1: AI 提问区 -->
    <div class="ui-container" id="screen-1">
        <div class="ai-glass-box">
            <input type="text" class="ai-input" id="ai-input" placeholder="Initiate connection with Archives..." autocomplete="off">
            <button class="send-btn" id="send-btn">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
            </button>
        </div>
    </div>

    <!-- 界面 2: About Me (档案区) -->
    <div class="ui-container" id="screen-2">
        <div class="archive-box">
            <div class="corner top-left"></div>
            <div class="corner bottom-right"></div>
            <button class="skip-btn" id="skip-btn">SKIP >></button>
            <div class="typing-content" id="output-text"></div>
        </div>
    </div>

    <script src="../assets/js/about.js"></script>
</body>
</html>
