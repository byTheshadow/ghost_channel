<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GHOST CHANNEL - Main</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            color: #f0f0f0;
            font-family: 'Courier New', monospace;
            min-height: 100vh;
            position: relative;
        }

        /* 噪点效果 */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.03;
            z-index: 1;
            pointer-events: none;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' /%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' /%3E%3C/svg%3E");
        }

        /* 聚光灯效果 */
        .spotlight {
            position: fixed;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.1) 0%, transparent 70%);
            pointer-events: none;
            z-index: 999;
            mix-blend-mode: screen;
            transition: transform 0.1s ease;
        }

        /* 导航栏 */
        nav {
            position: relative;
            z-index: 100;
            background: rgba(20, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            padding: 20px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #cc0000;
        }

        .logo {
            font-size: 28px;
            font-weight: bold;
            color: #cc0000;
            text-shadow: 0 0 10px #cc0000;
            letter-spacing: 3px;
        }

        .nav-links {
            display: flex;
            gap: 30px;
            list-style: none;
        }

        .nav-links a {
            color: #f0f0f0;
            text-decoration: none;
            font-size: 16px;
            transition: all 0.3s;
            position: relative;
        }

        .nav-links a:hover {
            color: #cc0000;
            text-shadow: 0 0 10px #cc0000;
        }

        /* 主内容区 */
        .main-content {
            position: relative;
            z-index: 2;
            display: flex;
            padding: 50px;
            gap: 50px;
            min-height: calc(100vh - 80px);
        }

        /* 打印机区域 */
        .printer-section {
            flex: 0 0 400px;
        }

        .printer {
            background: linear-gradient(145deg, #2a2a2a, #1a1a1a);
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            position: relative;
        }

        .printer-top {
            background: #3a3a3a;
            height: 40px;
            border-radius: 10px 10px 0 0;
            margin: -30px -30px 20px -30px;
            border-bottom: 3px solid #cc0000;
        }

        .paper {
            background: #f5f5f5;
            color: #0a0a0a;
            padding: 20px;
            border-radius: 5px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            line-height: 1.8;
            min-height: 300px;
            box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.1);
            position: relative;
            overflow: hidden;
        }

        .paper::before {
            content: '';
            position: absolute;
            top: 0;
            left: 20px;
            width: 2px;
            height: 100%;
            background: #cc0000;
            opacity: 0.3;
        }

        .typing-text {
            white-space: pre-wrap;
        }

        .cursor {
            display: inline-block;
            width: 8px;
            height: 16px;
            background: #cc0000;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }

        /* 背景装饰区 */
        .background-section {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .decoration {
            font-size: 120px;
            opacity: 0.1;
            color: #cc0000;
            text-align: center;
            user-select: none;
        }

        /* 幽灵跟随器 */
        .ghost-follower {
            position: fixed;
            bottom: 20px;
            font-size: 30px;
            pointer-events: none;
            z-index: 998;
            transition: left 0.5s ease, transform 0.3s ease;
        }

        @media (max-width: 768px) {
            .main-content {
                flex-direction: column;
                padding: 20px;
            }
            
            .printer-section {
                flex: 1;
            }
        }
    </style>
</head>
<body>
    <div class="spotlight" id="spotlight"></div>
    <div class="ghost-follower" id="ghostFollower">👻</div>

    <nav>
        <div class="logo">GHOST://CHANNEL</div>
        <ul class="nav-links">
            <li><a href="main.html">HOME</a></li>
            <li><a href="about.html">ABOUT ME</a></li>
        </ul>
    </nav>

    <div class="main-content">
        <div class="printer-section">
            <div class="printer">
                <div class="printer-top"></div>
                <div class="paper">
                    <div class="typing-text" id="typingText"></div>
                    <span class="cursor"></span>
                </div>
            </div>
        </div>

        <div class="background-section">
            <div class="decoration">
                🎸<br>
                SHADOW<br>
                玉元一
            </div>
        </div>
    </div>

    <script>
        // 聚光灯跟随鼠标
        const spotlight = document.getElementById('spotlight');
        document.addEventListener('mousemove', (e) => {
            spotlight.style.left = (e.clientX - 150) + 'px';
            spotlight.style.top = (e.clientY - 150) + 'px';
        });

        // 幽灵跟随鼠标
        const ghost = document.getElementById('ghostFollower');
        let ghostX = 0;
        document.addEventListener('mousemove', (e) => {
            ghostX = e.clientX - 15;
            ghost.style.left = ghostX + 'px';
            
            // 根据移动方向翻转幽灵
            if (e.movementX > 0) {
                ghost.style.transform = 'scaleX(1)';
            } else if (e.movementX < 0) {
                ghost.style.transform = 'scaleX(-1)';
            }
        });

        // 打印机打字效果
        const text = `正在打印...

欢迎来到 GHOST CHANNEL

这里是 SHADOW 玉元一的个人空间

一个充满暗黑美学的创作展示地

在这里你可以找到：
- 角色卡作品
- 美化主题
- 预设分享
- 插件开发

探索更多，点击导航栏...`;

        const typingElement = document.getElementById('typingText');
        let i = 0;

        function typeWriter() {
            if (i < text.length) {
                typingElement.textContent += text[i];
                i++;
                setTimeout(typeWriter, 50);
            }
        }

        // 页面加载后开始打字
        setTimeout(typeWriter, 500);
    </script>
</body>
</html>
