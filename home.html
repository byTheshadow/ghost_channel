<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghost Channel - Home</title>
    <!-- 字体 -->
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Creepster&display=swap" rel="stylesheet">
    <!-- 样式 -->
    <link rel="stylesheet" href="assets/css/global.css">
    <link rel="stylesheet" href="assets/css/animations.css">
    <link rel="stylesheet" href="assets/css/home.css">
</head>
<body>
    <!-- CRT扫描线 -->
    <div class="scanline"></div>
    
    <!-- 屏幕暗角 -->
    <div class="vignette"></div>

    <!-- 导航栏 -->
    <nav class="navbar" id="navbar">
        <div class="nav-content">
            <div class="nav-left">
                <div class="ghost-icon"></div>
                <span class="nav-title">GHOST_CHANNEL</span>
            </div>
            <div class="nav-links">
                <a href="home.html" class="nav-link active">HOME</a>
                <a href="pages/about.html" class="nav-link">ABOUT</a>
                <a href="pages/characters.html" class="nav-link">CHARACTERS</a>
                <a href="pages/gallery.html" class="nav-link">GALLERY</a>
                <a href="pages/presets.html" class="nav-link">PRESETS</a>
                <a href="pages/plugins.html" class="nav-link">PLUGINS</a>
                <a href="pages/links.html" class="nav-link">LINKS</a>
            </div>
            <div class="hamburger" id="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </nav>

    <!-- 移动端侧边栏 -->
    <div class="sidebar" id="sidebar">
        <a href="home.html" class="active">HOME</a>
        <a href="pages/about.html">ABOUT</a>
        <a href="pages/characters.html">CHARACTERS</a>
        <a href="pages/gallery.html">GALLERY</a>
        <a href="pages/presets.html">PRESETS</a>
        <a href="pages/plugins.html">PLUGINS</a>
        <a href="pages/links.html">LINKS</a>
    </div>

    <!-- 车票阶段 -->
    <div class="ticket-stage" id="ticketStage">
        <div class="ticket-container">
            <!-- 左侧：音波动画 -->
            <div class="ticket-left">
                <canvas id="waveCanvas"></canvas>
            </div>

            <!-- 右侧：车票 -->
            <div class="ticket-right" id="ticketRight">
                <div class="ticket" id="ticket">
                    <div class="ticket-header">
                        <span class="ticket-logo">🎫</span>
                        <span class="ticket-title">GHOST EXPRESS</span>
                    </div>
                    
                    <div class="ticket-body">
                        <div class="ticket-row">
                            <span class="ticket-label">FROM:</span>
                            <span class="ticket-value" id="ticketFrom">LOADING...</span>
                        </div>
                        <div class="ticket-row">
                            <span class="ticket-label">TO:</span>
                            <span class="ticket-value destination">THE MIDDLE OF NOWHERE</span>
                        </div>
                        <div class="ticket-row">
                            <span class="ticket-label">DATE:</span>
                            <span class="ticket-value" id="ticketDate">2026-04-21</span>
                        </div>
                        <div class="ticket-row">
                            <span class="ticket-label">TIME:</span>
                            <span class="ticket-value">23:59</span>
                        </div>
                    </div>

                    <div class="ticket-footer">
                        <span class="ticket-hint">CLICK TO BOARD →</span>
                    </div>

                    <!-- 撕裂线 -->
                    <div class="tear-line"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- 代码矩阵背景 -->
    <div class="code-matrix" id="codeMatrix"></div>

    <!-- 打印机阶段 -->
    <div class="printer-stage" id="printerStage">
        <div class="printer" id="printer">
            <!-- 打印机主体 -->
            <div class="printer-body">
                <div class="printer-top">
                    <div class="printer-led"></div>
                    <span class="printer-brand">GHOST PRINTER v1.0</span>
                </div>
                
                <!-- 纸张出口 -->
                <div class="paper-slot">
                    <div class="paper" id="paper">
                        <div class="paper-content" id="paperContent">
                            <!-- 打字机内容将在这里生成 -->
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 通用导航栏脚本 -->
    <script src="assets/js/navbar.js"></script>
    <!-- 页面专属脚本 -->
    <script src="assets/js/home.js"></script>
</body>
</html>
